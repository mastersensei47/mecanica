        .reproductor-box {

        .video-card {
            background: #1a1a1a;
            border: 1px solid #444;

        }

        .video-summary {
            padding: 15px;
            background: #222;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none; /* Oculta la flecha por defecto */
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        /* Flecha custom para el acordeón */
        .video-summary::-webkit-details-marker { display: none; }
        .video-summary::after {
            content: '▼';
            font-size: 12px;
            color: #ff0000;
            transition: transform 0.3s ease;
        }

        .video-card[open] .video-summary {
            border-bottom: 1px solid #ff0000;
            background: #333;
        }

        .video-card[open] .video-summary::after {
            transform: rotate(180deg);
        }

        .video-body {
            padding: 15px;
            background: #000;
        }

        .video-container { 
            position: relative; 
            padding-top: 56.25%; /* Relación de aspecto 16:9 */
            background: #000; 
            width: 100%;
        }
        
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* Overlay "Toca para reproducir": el video no se carga hasta que el usuario
           lo pide explícitamente, evitando reproducción o descarga automática. */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(180deg, #1a1a1a, #000);

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);

            width: 100%;

        /* Wrapper que permite arrastrar (pan) la imagen cuando está ampliada */

            height: 100%;

            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: grab;

            -webkit-user-drag: none;
            touch-action: none;

        /* Barra de controles de zoom, siempre visible y fija abajo */

    </style>

<script>
/**
 * BASE DE DATOS DE CAPÍTULOS
 * 
 * CÓMO AGREGAR UN VIDEO DE YOUTUBE (no listado):
 * 1. Subí el video a YouTube como "No listado" (no "Privado", porque privado no se puede embeber).
 * 2. Copiá el link del video, por ejemplo: https://www.youtube.com/watch?v=dQw4w9WgXcQ
 * 3. El "id" que necesitás es la parte que está después de "v=": dQw4w9WgXcQ (siempre 11 caracteres).
 *    - Si el link es corto (youtu.be/dQw4w9WgXcQ), el id es lo que está después de youtu.be/
 * 4. Pegalo así en el capítulo correspondiente:
 *    videos: [ { id: "dQw4w9WgXcQ", titulo: "🎥 Nombre del video" } ]
 * 5. Si un capítulo tiene más de un video, separalos con coma dentro del mismo []:
 *    videos: [ 
 *        { id: "dQw4w9WgXcQ", titulo: "🎥 Primera parte" },
 *        { id: "oHg5SJYRHA0", titulo: "🎥 Segunda parte" }
 *    ]
 * 6. Si un capítulo todavía no tiene video, dejalo como: videos: []
 */
const capitulos = {
    "1": { 
        videos: [ { id: "WMR-nfepfTI", titulo: "Cómo funciona un Motor de 4 Tiempos" } ], 
        t: "Motor de 4 Tiempos", 
        d: `El funcionamiento se divide en cuatro fases principales según el movimiento del pistón dentro del cilindro:

Admisión: El pistón baja desde el punto muerto superior (PMS) al punto muerto inferior (PMI). En este proceso, entra la mezcla de aire y combustible al cilindro.

Compresión: El pistón sube del PMI al PMS, comprimiendo la mezcla. Esto aumenta la presión y la temperatura antes de la explosión.

Explosión y Expansión: Una chispa de la bujía enciende la mezcla comprimida, generando una explosión que empuja con fuerza el pistón hacia abajo (al PMI). Esta es la fase que genera la fuerza del motor.

Escape: El pistón vuelve a subir hacia el PMS con la válvula de escape abierta, expulsando los gases quemados hacia el exterior para reiniciar el ciclo.`,
        imagenes: ["https://upload.wikimedia.org/wikipedia/commons/a/a6/4-Stroke-Engine.gif"] 
    },
    "2": { 
        videos: [ { id: "XUmz26o692Y", titulo: "como medir la Cilindrada" } ], 
        t: "Componentes del Bloque y Cilindrada", 
        d: `Componentes pesados que transforman la explosión en movimiento:

Cilindro: Cavidad donde ocurre la combustión.
Pistón: Se desliza entre el PMS y el PMI.
Aros: De compresión (fuego), segundo aro y rasca aceite.
Biela y Cigüeñal: Transforman el movimiento lineal en rotativo.

FÓRMULA DE CILINDRADA MATEMÁTICA:
Cilindrada = (Pi x Diámetro² / 4) x Carrera

Ejemplo práctico en la imagen: Motor de 52mm de diámetro y 50mm de carrera.
Cuenta: (3.1416 x 2704 / 4) x 50 = 106.186 mm³ = 106 cc (Típico motor 110cc).`,
        imagenes: ["cap2.jpg"]
    },
    "3": { 
        videos: [ { id: "iy7EsSonTx8", titulo: "El Sistema OHV (Varillero)" } ], 
        t: "Sistema de Distribución (OHV Varillero)", 
        d: `Aca se explica cómo el motor "respira" y se sincroniza.

Tapa de Cilindro: Sella la parte superior. Contiene las válvulas, sus asientos, guías, resortes y retenes.
Árbol de Levas: El "director de orquesta". Abre y cierra las válvulas en el momento justo.

Motor OHV (Varillero): El árbol de levas está abajo en el block (junto al cigüeñal). Usa botadores y varillas largas para empujar los balancines arriba en la tapa de cilindros.

Dato clave: El engranaje del cigüeñal siempre tiene la mitad de dientes que el del árbol de levas (relación 2:1).`,
        imagenes: ["cap3.jpg"]
    },
    "4": { 
        videos: [ { id: "VqDKwaINEYw", titulo: "Regulación de Válvulas" } ], 
        t: "Sincronización y Motor Cadenero (OHC)", 
        d: `Cómo se coordina el movimiento del pistón con las válvulas.

Motor OHC (Cadenero): A diferencia del varillero, el árbol de levas está arriba, en la tapa de cilindros. Usa una cadena de distribución impulsada por el cigüeñal para mover la leva.

Relación de giro (2:1): El cigüeñal debe dar 2 vueltas completas para que la leva dé 1 sola vuelta. 

Regulación de Válvulas: Se hace con el pistón en el PMS y el árbol de levas en compresión. Se usa una sonda de láminas (galga) que se pasa entre el registro y la válvula.`,
        imagenes: ["cap4.jpg"]
    },
    "5": { 
        videos: [], 
        t: "Sistema de Encendido, Ignición y Carga", 
        d: `El "sistema nervioso" de la moto, dividido en dos etapas:

Ignición (Chispa): El Volante Magnético genera la señal con el sensor (pickup), el CDI de 4 contactos procesa esa señal y manda la orden a la Bobina de Alta Tensión. Esta eleva el voltaje y lo manda a la Bujía para generar la chispa.

Carga: El estator (bobinado) genera corriente alterna. El Regulador/Rectificador la transforma a corriente continua estabilizada (entre 13V y 14.5V) para recargar la Batería y evitar que se quemen las luces o los fusibles.`,
        imagenes: ["13802.jpg"]
    },
    "6": { 
        videos: [], 
        t: "Embrague y Transmisión", 
        d: `Cómo controlamos la fuerza del motor hacia la rueda:

El Embrague: Su función es acoplar y desacoplar el movimiento del cigüeñal hacia la caja de cambios. Al apretar la manija, separamos los discos de fricción (fibra) de los discos separadores (acero), cortando la transmisión de fuerza para poder pasar los cambios.

Caja de Cambios: Un conjunto de engranajes ubicados en dos ejes (primario y secundario). Nos permite multiplicar la fuerza del motor (marchas bajas) o ganar velocidad final (marchas altas).`,
        imagenes: ["cap6.jpg", "cap.jpg"] 
    },
    "7": { 
        videos: [ { id: "h_A7FFrPBqY", titulo: "ALIMENTACION DE COMBUSTIBLE POR INYECCION" }, { id: "NdiPN0MRqGk", titulo: "alimentacion por carburador" } ], 
        t: "Sistema de Alimentación", 
        d: `El encargado de preparar la "comida" del motor: la mezcla de aire y nafta.

Carburador: Funciona por vacío. Cuando el pistón baja, aspira aire que pasa por el carburador, arrastrando partículas de nafta a través de los chicleres para crear una mezcla explosiva.

Inyección Electrónica (EFI): Una computadora (ECU) calcula mediante sensores cuánto aire entra y le ordena a un inyector rociar nafta a presión, logrando más eficiencia.`,
        imagenes: ["cap7.jpg"]
    },
    "8": { 
        videos: [ { id: "YQjM7H4uEH4", titulo: "Refrigeración" } ], 
        t: "Sistemas de Lubricación y Refrigeración", 
        d: `Los sistemas que mantienen vivo al motor:

Lubricación: Evita que los metales se fundan. La bomba chupa aceite del cárter, lo filtra y lo sube a presión hasta la tapa de cilindros para lubricar la leva y balancines, bajando luego por gravedad.

Refrigeración: 
- Por Aire: El cilindro tiene "aletas" metálicas que el viento enfría al avanzar.
- Por Líquido: Usa un radiador, conductos de agua alrededor del cilindro y una bomba, estabilizando mucho mejor la temperatura.`,
        imagenes: ["ChatGPT Image 20 jun 2026, 21_54_05.png"]
    },
    "9": { 
        videos: [ { id: "l0qE8MFNjKs", titulo: "⭐ capitulo extenso (29 min)" } ], 
        t: "Clase Magistral de Desarme", 
        d: `En este material audiovisual analizamos a fondo el ciclo de combustión y desarmamos piezas en tiempo real.

00:00 Ciclo de combustión de los 4 tiempos
08:02 Ciclo de combustión de los 2 tiempos
13:24 Válvula de láminas o pétalos
15:02 Lubricación
21:12 Relación de compresión
23:41 Distribución mediante válvulas & válvulas de potencia
27:18 Inyección directa

ADVERTENCIA: El material presentado puede diferir en algunos detalles respecto al contenido teórico, aunque mantiene el mismo principio de funcionamiento.`,
        imagenes: ["{9E0E6CB7-084E-4734-B6DA-EE9001970923}.jpg"]
    }
};

function init() {
    const params = new URLSearchParams(window.location.search);
    const capId = params.get('cap') || "1";
    const data = capitulos[capId];

    if (data) {
        const vidWrapper = document.getElementById('vid-wrapper');
        vidWrapper.innerHTML = ""; 
        
        // Cargar múltiples videos usando el sistema de acordeón (Tarjetas Desplegables)
        // IMPORTANTE: el iframe de YouTube NO se crea hasta que el usuario toca "Reproducir".
        // Así ningún video se carga ni se reproduce solo al entrar a la página.
        if (data.videos && data.videos.length > 0) {
            data.videos.forEach((videoObj, index) => {
                if (videoObj.id && videoObj.id !== "ID_YOUTUBE_ACA") {
                    
                    const details = document.createElement('details');
                    details.className = "video-card";
                    details.open = false; // Ninguna tarjeta se abre sola: el usuario decide qué video ver.

                    const summary = document.createElement('summary');
                    summary.className = "video-summary";
                    summary.innerText = videoObj.titulo || "Video " + (index + 1);
                    
                    const body = document.createElement('div');
                    body.className = "video-body";

                    const vidCont = document.createElement('div');
                    vidCont.className = "video-container";

                    // Overlay de "Reproducir": el iframe se inserta recién cuando el usuario
                    // toca el botón, para no descargar/reproducir video de fondo sin permiso.
                    const playOverlay = document.createElement('div');
                    playOverlay.className = "play-overlay";
                    playOverlay.innerHTML = '<div class="play-btn">▶</div><div class="play-texto">Toca para reproducir</div>';
                    vidCont.appendChild(playOverlay);

                    let cargado = false;
                    function cargarVideo() {
                        if (cargado) return;
                        cargado = true;
                        playOverlay.remove();

                        const iframe = document.createElement('iframe');
                        iframe.allowFullscreen = true;
                        iframe.loading = "lazy";
                        iframe.src = "https://www.youtube.com/embed/" + videoObj.id + "?autoplay=1";
                        vidCont.appendChild(iframe);
                    }

                    playOverlay.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        cargarVideo();
                    });

                    body.appendChild(vidCont);
                    details.appendChild(summary);
                    details.appendChild(body);
                    vidWrapper.appendChild(details);
                }
            });
        }

        document.getElementById('cap-titulo').innerText = data.t;
        document.getElementById('cap-desc').innerText = data.d;
        document.title = "MS47 - " + data.t;

        const galeria = document.getElementById('img-gallery');
        galeria.innerHTML = ""; 
        
        // Cargar imágenes
        if(data.imagenes && data.imagenes.length > 0) {
            data.imagenes.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = 'cap-img';
                img.alt = 'Esquema MS47 - ' + data.t;
                
                // Abrir el Modal al hacer click
                img.onclick = function() {
                    abrirModalZoom(this.src);
                }

                img.onerror = function() {
                    this.style.border = "2px solid red";
                    this.alt = "⚠️ ERROR: No se encontró la imagen local " + imgSrc;
                };
                galeria.appendChild(img);
            });
        }
    } else {
        window.location.href = "?cap=1";
    }

    renderBotones(capId);
}

function renderBotones(actual) {
    const contenedor = document.getElementById('btn-container');
    const contenedorExtra = document.getElementById('btn-extra-container');
    
    contenedor.innerHTML = ""; 
    contenedorExtra.innerHTML = "";

    for (let clave in capitulos) {
        const link = document.createElement('a');
        link.className = "cap-btn " + (clave === actual ? "active" : "");
        link.href = "?cap=" + clave;

        if (clave === "9") {
            link.innerText = "⭐ CAPÍTULO EXTENSO (29 MIN) ⭐";
            link.classList.add("btn-extenso");
            contenedorExtra.appendChild(link);
        } else {
            link.innerText = "CAP " + clave;
            contenedor.appendChild(link);
        }
    }
}

// ===== LÓGICA DE ZOOM CONTROLADO POR EL USUARIO =====
// Reemplaza el viejo sistema de "toggle a una escala fija" por zoom progresivo
// con botones +/-, pellizco con dos dedos, arrastre y doble-tap.

const modal = document.getElementById("imageModal");
const modalViewport = document.getElementById("modalViewport");
const modalImg = document.getElementById("imgZoomed");
const zoomLevelLabel = document.getElementById("zoomLevel");

const ZOOM_MIN = 1;
const ZOOM_MAX = 4;
const ZOOM_STEP = 0.5;

let escala = 1;
let posX = 0; // desplazamiento (pan) actual en px
let posY = 0;

function aplicarTransform() {
    modalImg.style.transform = `translate(${posX}px, ${posY}px) scale(${escala})`;
    modalImg.style.cursor = escala > 1 ? "grab" : "zoom-in";
    zoomLevelLabel.innerText = Math.round(escala * 100) + "%";
}

function limitarPan() {
    // Evita que la imagen se arrastre infinitamente fuera de pantalla
    const maxOffsetX = (modalViewport.clientWidth * (escala - 1)) / 2 + 100;
    const maxOffsetY = (modalViewport.clientHeight * (escala - 1)) / 2 + 100;
    posX = Math.max(-maxOffsetX, Math.min(maxOffsetX, posX));
    posY = Math.max(-maxOffsetY, Math.min(maxOffsetY, posY));
}

function setEscala(nuevaEscala) {
    escala = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, nuevaEscala));
    if (escala === ZOOM_MIN) { posX = 0; posY = 0; }
    limitarPan();
    aplicarTransform();
}

function abrirModalZoom(src) {
    modal.style.display = "block";
    modalImg.src = src;
    escala = 1; posX = 0; posY = 0;
    aplicarTransform();
}

function cerrarModal() {
    modal.style.display = "none";
}

// --- Botones de control ---
document.getElementById("zoomIn").onclick = function(e) {
    e.stopPropagation();
    setEscala(escala + ZOOM_STEP);
};
document.getElementById("zoomOut").onclick = function(e) {
    e.stopPropagation();
    setEscala(escala - ZOOM_STEP);
};
document.getElementById("zoomReset").onclick = function(e) {
    e.stopPropagation();
    setEscala(1);
};

// --- Doble click / doble tap: alterna entre 1x y 2x ---
let ultimoTap = 0;
modalImg.addEventListener('click', function(e) {
    e.stopPropagation();
    const ahora = Date.now();
    if (ahora - ultimoTap < 300) {
        setEscala(escala > 1 ? 1 : 2);
    }
    ultimoTap = ahora;
});

// --- Arrastre (pan) con mouse, solo si hay zoom aplicado ---
let arrastrando = false;
let inicioX = 0, inicioY = 0;

modalViewport.addEventListener('mousedown', function(e) {
    if (escala <= 1) return;
    arrastrando = true;
    modalViewport.classList.add('dragging');
    inicioX = e.clientX - posX;
    inicioY = e.clientY - posY;
});
window.addEventListener('mousemove', function(e) {
    if (!arrastrando) return;
    posX = e.clientX - inicioX;
    posY = e.clientY - inicioY;
    limitarPan();
    aplicarTransform();
});
window.addEventListener('mouseup', function() {
    arrastrando = false;
    modalViewport.classList.remove('dragging');
});

// --- Rueda del mouse: zoom in/out (desktop) ---
modalViewport.addEventListener('wheel', function(e) {
    if (modal.style.display !== "block") return;
    e.preventDefault();
    setEscala(escala + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
}, { passive: false });

// --- Gestos táctiles (celular): pellizco para zoom, un dedo para arrastrar ---
let pinchInicial = null;
let escalaInicialPinch = 1;
let touchInicioX = 0, touchInicioY = 0;
let panInicioX = 0, panInicioY = 0;

function distanciaToques(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

modalViewport.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
        pinchInicial = distanciaToques(e.touches);
        escalaInicialPinch = escala;
    } else if (e.touches.length === 1 && escala > 1) {
        touchInicioX = e.touches[0].clientX - posX;
        touchInicioY = e.touches[0].clientY - posY;
    }
}, { passive: true });

modalViewport.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && pinchInicial !== null) {
        e.preventDefault();
        const distanciaActual = distanciaToques(e.touches);
        const factor = distanciaActual / pinchInicial;
        setEscala(escalaInicialPinch * factor);
    } else if (e.touches.length === 1 && escala > 1) {
        e.preventDefault();
        posX = e.touches[0].clientX - touchInicioX;
        posY = e.touches[0].clientY - touchInicioY;
        limitarPan();
        aplicarTransform();
    }
}, { passive: false });

modalViewport.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) pinchInicial = null;
});

// --- Cerrar el Modal ---
document.getElementById("closeModal").onclick = cerrarModal;

// Cerrar el modal tocando el fondo negro (fuera de la imagen), pero no si se está arrastrando
modalViewport.addEventListener('click', function(e) {
    if (e.target === modalViewport) cerrarModal();
});

window.onload = init;
</script>
